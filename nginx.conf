# 星罗静态站点 Nginx 配置
# 服务于 nginx:alpine 容器，托管 Astro 构建产物 dist/

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩文本类资源
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # 带哈希的 _astro/ 资源长期不可变缓存
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # pagefind 搜索索引可长期缓存
    location /pagefind/ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # 静态二进制资源长期缓存
    location ~* \.(?:png|jpg|jpeg|gif|ico|webp|avif|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # RSS / sitemap / robots 短缓存
    location ~* \.(?:xml|txt)$ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # 默认路由：优先精确文件 → 目录 → .html 后缀 → 404 页
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # 自定义错误页回落
    error_page 404 /404.html;
    location = /404.html {
        internal;
        try_files $uri /404.html;
    }
}
