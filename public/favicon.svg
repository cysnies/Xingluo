<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="星罗">
  <!-- 圆角方形底 -->
  <rect width="32" height="32" rx="7" fill="oklch(0.205 0 0)"/>
  <!-- 对称四芒星：四条三次贝塞尔曲线构成凹边星形，沿纵横轴与对角线全对称 -->
  <path d="M16 3.5
           C 17 11.5, 20.5 15, 28.5 16
           C 20.5 17, 17 20.5, 16 28.5
           C 15 20.5, 11.5 17, 3.5 16
           C 11.5 15, 15 11.5, 16 3.5 Z"
        fill="oklch(0.985 0 0)"/>
  <!-- 中心点缀小菱形，呼应「星罗」群星意象，保持点对称 -->
  <path d="M16 13.2 L17.2 16 L16 18.8 L14.8 16 Z" fill="oklch(0.205 0 0)"/>
</svg>
