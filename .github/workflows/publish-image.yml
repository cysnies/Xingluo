# 星罗容器镜像发布：发布 Release 时构建并推送镜像到 GitHub Packages (GHCR)
name: Publish Image

on:
  release:
    types: [published]
  # 支持手动触发，便于在 main 上重新发布 latest
  workflow_dispatch:
    inputs:
      ref:
        description: 构建所基于的分支/标签
        required: false
        default: main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # 镜像名小写，GHCR 要求全小写
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: 提取版本标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Release tag → 对应版本标签；手动触发 → latest
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=星罗
            org.opencontainers.image.description=基于 Astro 与 shadcn 的现代化博客 CMS
            org.opencontainers.image.licenses=MIT

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 QEMU（多架构构建）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CI_SITE_URL=${{ vars.IMAGE_CI_SITE_URL }}
            CI_BASE_URL=${{ vars.IMAGE_CI_BASE_URL }}
          provenance: false
