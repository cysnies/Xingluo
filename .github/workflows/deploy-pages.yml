# 星罗 GitHub Pages 部署：main 分支内容变更时构建并发布
name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "astro.config.ts"
      - "xingluo.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# 同分支仅保留最新一次部署
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: 构建站点
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 计算部署 URL
        id: urls
        run: |
          # 通过仓库变量 PAGES_SITE_URL / PAGES_BASE_URL 自定义部署域名与子路径。
          # 未设置时按 GitHub Pages 根路径部署（适配自定义域名及用户站点），
          # 若需部署到 https://<owner>.github.io/<repo>/ 项目页，请设置：
          #   PAGES_SITE_URL = "https://<owner>.github.io"
          #   PAGES_BASE_URL = "/<repo>/"
          SITE_URL="${{ vars.PAGES_SITE_URL }}"
          BASE_URL="${{ vars.PAGES_BASE_URL }}"
          # 默认值：site 取仓库的 GitHub Pages URL，base 设为根路径
          if [ -z "$SITE_URL" ]; then
            SITE_URL="${{ github.event.repository.homepage || '' }}"
          fi
          if [ -z "$SITE_URL" ]; then
            SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi
          if [ -z "$BASE_URL" ]; then
            BASE_URL="/"
          fi
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "将部署到 $SITE_URL（base=$BASE_URL）"

      - name: 构建站点
        run: pnpm run build
        env:
          CI_SITE_URL: ${{ steps.urls.outputs.site_url }}
          CI_BASE_URL: ${{ steps.urls.outputs.base_url }}
          PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_VERIFICATION }}

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: 部署到 GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v5
